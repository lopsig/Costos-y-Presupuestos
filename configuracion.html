<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuración — Costos Y Presupuestos</title>
  <link rel="stylesheet" href="costos.css">
</head>

<body>

  <header>
    <h1>COSTOS Y PRESUPUESTOS</h1>
  </header>

  <!-- NAV: links a cada página -->
  <nav>
    <a href="index.html">Conceptos</a>
    <a href="materia-prima.html">Materia Prima</a>
    <a href="recetas.html">Recetas</a>
    <a href="configuracion.html">Configuración</a>
    <a href="costo-produccion.html">Costo de Producción</a>
  </nav>

  <!-- SECCIÓN: CONFIGURACIÓN -->
  <section id="configuracion" class="activa">
    <div class="seccion-sistema">
      <h2>Configuración</h2>
      <p>Define los parámetros que se usarán para calcular el costo de producción.</p>

      <div class="formulario">

        <!-- Costo por hora del cocinero -->
        <div class="campo">
          <label for="conf-mano-obra">Costo por hora de mano de obra ($)</label>
          <input type="number" id="conf-mano-obra" placeholder="Ej: 2.50" min="0" step="0.01">
        </div>

        <!-- Porcentaje que se agrega por luz, agua, gas, etc. -->
        <div class="campo">
          <label for="conf-indirectos">Porcentaje de costos indirectos (%)</label>
          <input type="number" id="conf-indirectos" placeholder="Ej: 15" min="0" max="100" step="1">
        </div>

        <!-- Margen de ganancia deseado -->
        <div class="campo">
          <label for="conf-margen">Margen de ganancia (%)</label>
          <input type="number" id="conf-margen" placeholder="Ej: 40" min="0" step="1">
        </div>

        <button onclick="guardarConfiguracion()">Guardar Configuración</button>

      </div>

      <!-- Mensaje de confirmación al guardar -->
      <p id="msg-configuracion"></p>

    </div>
  </section>

  <script src="datos.js"></script>
  <script src="navegacion.js"></script>
  <script src="configuracion.js"></script>
</body>

</html>
